<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
  <h2>Spotify</h2>
</header>

<main>

<section class="area-musicas">

  <nav>
    <ul>
      <li>
        <p><a href="novo-balanco.html" target="conteudot">Novo Balan&ccedil;o</a></p>
        <p><a href="indispensavel.html" target="conteudot">Indispens&aacute;vel</a></p>
        <p><a href="fala-na-cara.html" target="conteudot">Fala na cara</a></p>
      </li>
    </ul>
  </nav>

  <article>
    <iframe
      name="conteudot"
      src="indispensavel.html"
      width="100%"
      height="100%"
      style="border: none;">
    </iframe>
  </article>

</section>

<section class="cadastro" id="cadastro">
  <div class="cadastro-conteudo">
    <div class="cadastro-titulo">
      <p>Cadastro</p>
      <h2>Crie sua conta</h2>
    </div>

    <form class="formulario-cadastro">
      <div class="campo">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome">
      </div>

      <div class="campo">
        <label for="sobrenome">Sobrenome</label>
        <input type="text" id="sobrenome" name="sobrenome">
      </div>

      <div class="campo">
        <label for="data-nascimento">Data de nascimento</label>
        <input type="date" id="data-nascimento" name="data-nascimento">
      </div>

      <div class="campo">
        <label for="email">Email</label>
        <input type="email" id="email" name="email">
      </div>

      <div class="campo">
        <label for="telefone">N&uacute;mero/telefone</label>
        <input type="tel" id="telefone" name="telefone">
      </div>

      <div class="campo">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha">
      </div>

      <div class="campo">
        <label for="confirmar-senha">Confirmar senha</label>
        <input type="password" id="confirmar-senha" name="confirmar-senha">
      </div>

      <div class="acoes-formulario">
        <button type="submit">Enviar</button>
        <button type="reset" class="botao-limpar">Limpar</button>
      </div>
    </form>
  </div>
</section>

</main>

<footer>
  <p>&copy; 2026 Spotify. Todos os direitos reservados.</p>
</footer>

</body>
</html>
